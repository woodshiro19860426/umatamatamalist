<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深江球転がしコンペ【幹事長室】</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #edeef0; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 1.4rem; color: #2c3e50; margin-bottom: 5px; }
        p.subtitle { text-align: center; font-size: 0.85rem; color: #7f8c8d; margin-top: 0; margin-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        textarea { width: 100%; height: 120px; padding: 10px; box-sizing: border-box; border: 2px solid #3498db; border-radius: 6px; font-size: 0.9rem; resize: vertical; }
        
        .btn-add { display: block; width: 100%; background: #3498db; color: white; text-align: center; padding: 12px 0; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-add:hover { background: #2980b9; }
        
        .summary-cards { display: flex; gap: 10px; margin: 20px 0; }
        .card { flex: 1; background: #f8f9fa; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; text-align: center; }
        .card .title { font-size: 0.75rem; color: #7f8c8d; font-weight: bold; }
        .card .value { font-size: 1.2rem; font-weight: bold; color: #2c3e50; margin-top: 5px; }
        .card.total-money { background: #e8f8f5; border-color: #a3e4d7; }
        .card.total-money .value { color: #16a085; }

        .list-title { font-size: 1rem; font-weight: bold; margin-top: 25px; margin-bottom: 10px; color: #2c3e50; border-left: 4px solid #16a085; padding-left: 8px; }
        
        /* 💡 テーブル周りのデザインを大幅にリニューアル */
        .bet-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        .bet-table th, .bet-table td { border: 1px solid #edf2f7; padding: 12px 10px; text-align: left; vertical-align: top; }
        .bet-table th { background: #f1f5f9; color: #4a5568; font-weight: bold; }
        .bet-table tr:nth-child(even) { background-color: #fcfcfc; }
        
        /* 買い目を見やすく整頓するスタイル */
        .bet-details-wrapper { font-family: monospace; font-size: 0.8rem; line-height: 1.4; color: #444; }
        .bet-item-line { margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px dashed #e2e8f0; }
        .bet-item-line:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .tag { display: inline-block; padding: 1px 4px; border-radius: 3px; font-size: 0.7rem; font-weight: bold; color: white; margin-right: 4px; }
        .tag-normal { background-color: #e74c3c; }
        .tag-box { background-color: #3498db; }
        .tag-form { background-color: #9b59b6; }
        
        .btn-del { background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 0.75rem; cursor: pointer; }
        .btn-clear { background: #7f8c8d; color: white; border: none; border-radius: 6px; padding: 8px 12px; font-size: 0.8rem; cursor: pointer; display: block; margin: 20px auto 0; }
        
        details.table-details summary { font-size: 0.8rem; color: #3498db; cursor: pointer; outline: none; user-select: none; }
        details.table-details[open] summary { margin-bottom: 6px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h1>深江球転がしコンペ【幹事長室】</h1>
    <p class="subtitle">LINEの買い目をコピペで自動集計システム 📊</p>

    <!-- コピペエリア -->
    <div class="form-group">
        <label for="rawText">LINEからコピーした文章をそのまま貼り付け</label>
        <textarea id="rawText" placeholder="メンバーからLINEに飛んできた「【深江球転がしコンペ】…」のメッセージを丸ごとここにペーストしてください。"></textarea>
        <button class="btn-add" onclick="processLineMessage()">➕ 買い目をリストに追加・更新</button>
    </div>

    <!-- 集計ダッシュボード -->
    <div class="summary-cards">
        <div class="card">
            <div class="title">投票人数</div>
            <div class="value" id="totalPeople">0 人</div>
        </div>
        <div class="card">
            <div class="title">総点数</div>
            <div class="value" id="totalCombos">0 点</div>
        </div>
        <div class="card total-money">
            <div class="title">コンペ総売上</div>
            <div class="value" id="totalCost">¥0</div>
        </div>
    </div>

    <!-- 参加者一覧リスト -->
    <div class="list-title">👥 現在の集計済みメンバー一覧</div>
    <div style="overflow-x: auto;">
        <table class="bet-table">
            <thead>
                <tr>
                    <th style="width: 20%;">購入者</th>
                    <th style="width: 55%;">買い目詳細（種類・点数・口数）</th>
                    <th style="width: 15%;">合計</th>
                    <th style="width: 10%;">操作</th>
                </tr>
            </thead>
            <tbody id="summaryTableBody">
                <tr>
                    <td colspan="4" style="text-align:center; color:#95a5a6; padding: 20px;">まだデータがありません。上のエリアにLINEをコピペしてください。</td>
                </tr>
            </tbody>
        </table>
    </div>

    <button class="btn-clear" onclick="clearAllData()">全データをリセット</button>
</div>

<script>
    const STORAGE_KEY = 'fukae_golf_summary_data_v2';
    let MasterList = [];

    window.onload = function() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            MasterList = JSON.parse(stored);
            renderTable();
        }
    };

    function processLineMessage() {
        const text = document.getElementById('rawText').value.trim();
        if (!text) { alert("テキストが空っぽです！"); return; }

        const nameMatch = text.match(/■購入者：([^\n]+)/);
        if (!nameMatch) {
            alert("エラー: 購入者（■購入者：〇〇）が見つかりません。");
            return;
        }
        const buyerName = nameMatch[1].trim();

        const costMatch = text.match(/■(?:総合計|合計)金額：([0-9,]+)/);
        if (!costMatch) {
            alert("エラー: 合計金額が見つかりません。");
            return;
        }
        const totalCost = parseInt(costMatch[1].replace(/,/g, ''));

        // 点数・口数・買い目の中身を綺麗にパース（解析）する
        let parsedLines = [];
        let totalCombos = 0;

        // メッセージを「＜買い目」ごとに分解して解析
        const blocks = text.split(/＜買い目\s*#[0-9]+＞/);
        
        // 分割したブロックを精査（最初の塊はヘッダーなのでスルー）
        for(let i = 1; i < blocks.length; i++) {
            let block = blocks[i].trim();
            if(!block) continue;

            // このブロック内の点数と口数を取得
            const comboRateMatch = block.match(/■\s*各\s*([0-9]+)口\s*×\s*計\s*([0-9]+)点/);
            let rate = 4;
            let combos = 0;
            if(comboRateMatch) {
                rate = parseInt(comboRateMatch[1]);
                combos = parseInt(comboRateMatch[2]);
                totalCombos += combos;
            }

            // 買い目の本文部分だけを抽出
            let lines = block.split('\n');
            let betInfo = "";
            let typeTag = "";

            if (block.includes('通常:')) {
                const match = block.match(/通常:\s*([^\n■]+)/);
                betInfo = match ? match[1].trim() : "通常流し";
                typeTag = '<span class="tag tag-normal">通常</span>';
            } else if (block.includes('BOX:')) {
                const match = block.match(/BOX:\s*([^\n■]+)/);
                betInfo = match ? match[1].trim() : "BOX";
                typeTag = '<span class="tag tag-box">BOX</span>';
            } else if (block.includes('フォーメーション:')) {
                const firstMatch = block.match(/【1着】([^\n]+)/);
                const secondMatch = block.match(/【2着】([^\n]+)/);
                const fStr = firstMatch ? firstMatch[1].trim() : "?";
                const sStr = secondMatch ? secondMatch[1].trim() : "?";
                betInfo = `1着[${fStr}] 2着[${sStr}]`;
                typeTag = '<span class="tag tag-form">フォーメ</span>';
            } else {
                betInfo = "詳細データ";
                typeTag = '<span class="tag" style="background:#7f8c8d;">馬単</span>';
            }

            parsedLines.push({
                tag: typeTag,
                info: betInfo,
                combos: combos,
                rate: rate
            });
        }

        // 古い単純なLINE形式（塊に分かれていないもの）への互換処理
        if (parsedLines.length === 0) {
            let infoText = "馬単データ";
            let tag = '<span class="tag" style="background:#7f8c8d;">馬単</span>';
            const comboMatch = text.match(/計\s*([0-9]+)\s*点/);
            const rateMatch = text.match(/各\s*([0-9]+)\s*口/);
            let singleCombos = comboMatch ? parseInt(comboMatch[1]) : 0;
            let singleRate = rateMatch ? parseInt(rateMatch[1]) : 4;
            totalCombos = singleCombos;

            if (text.includes('通常')) { tag = '<span class="tag tag-normal">通常</span>'; }
            else if (text.includes('BOX') || text.includes('ボックス')) { tag = '<span class="tag tag-box">BOX</span>'; }
            else if (text.includes('フォーメーション')) { tag = '<span class="tag tag-form">フォーメ</span>'; }

            const fallbackMatch = text.match(/(?:通常|BOX|【1着】)[^■]*/s);
            if (fallbackMatch) { infoText = fallbackMatch[0].trim().replace(/\n/g, ' '); }

            parsedLines.push({ tag: tag, info: infoText, combos: singleCombos, rate: singleRate });
        }

        // マスターリストへ格納（上書きチェック）
        const existingIndex = MasterList.findIndex(item => item.name === buyerName);
        if (existingIndex !== -1) {
            if (confirm(`${buyerName}さんは既にリストに存在します。新しい内容で【更新】しますか？`)) {
                MasterList[existingIndex] = { name: buyerName, bets: parsedLines, combos: totalCombos, cost: totalCost };
            } else { return; }
        } else {
            MasterList.push({ name: buyerName, bets: parsedLines, combos: totalCombos, cost: totalCost });
        }

        saveAndRefresh();
        document.getElementById('rawText').value = "";
    }

    function deleteItem(index) {
        MasterList.splice(index, 1);
        saveAndRefresh();
    }

    function clearAllData() {
        if (confirm("本当に全員のデータを削除してリセットしますか？")) {
            MasterList = [];
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(MasterList));
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('summaryTableBody');
        
        if (MasterList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#95a5a6; padding: 20px;">まだデータがありません。上のエリアにLINEをコピペしてください。</td></tr>`;
            document.getElementById('totalPeople').innerText = "0 人";
            document.getElementById('totalCombos').innerText = "0 点";
            document.getElementById('totalCost').innerText = "¥0";
            return;
        }

        tbody.innerHTML = "";
        let aggregateCombos = 0;
        let aggregateCost = 0;

        MasterList.forEach((item, index) => {
            aggregateCombos += item.combos;
            aggregateCost += item.cost;

            // 買い目詳細のHTMLブロックを生成（複数あれば改行で並べる）
            let detailsHTML = '<div class="bet-details-wrapper">';
            item.bets.forEach((b, idx) => {
                detailsHTML += `
                    <div class="bet-item-line">
                        ${b.tag} <strong>${b.info}</strong> 
                        <span style="color:#7f8c8d; font-size:0.75rem;">(${b.combos}点×${b.rate}口)</span>
                    </div>`;
            });
            detailsHTML += '</div>';

            // 買い目が多い場合はスッキリさせるため、開閉アコーディオンにする
            let cellContent = detailsHTML;
            if (item.bets.length > 2) {
                cellContent = `
                    <details class="table-details">
                        <summary>🔍 買い目合計 ${item.bets.length} 件を表示</summary>
                        ${detailsHTML}
                    </details>
                `;
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight:bold; color:#2c3e50;">${item.name}</td>
                <td>${cellContent}</td>
                <td style="font-weight:bold; color:#16a085;">¥${item.cost.toLocaleString()}</td>
                <td><button class="btn-del" onclick="deleteItem(${index})">削除</button></td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('totalPeople').innerText = `${MasterList.length} 人`;
        document.getElementById('totalCombos').innerText = `${aggregateCombos} 点`;
        document.getElementById('totalCost').innerText = `¥${aggregateCost.toLocaleString()}`;
    }
</script>

</body>
</html>
